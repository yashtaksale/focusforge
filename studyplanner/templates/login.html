{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Study Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-dark text-white d-flex align-items-center justify-content-center"
      style="min-height:100vh">

    <div class="card glass-card p-5" style="width:100%; max-width:400px">
        <h3 class="text-center mb-4">
            <i class="fas fa-brain me-2 text-info"></i>Study Planner
        </h3>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <input type="text" name="username"
                       class="form-control bg-dark text-white border-secondary"
                       placeholder="Username" required autofocus>
            </div>
            <div class="mb-4">
                <input type="password" name="password"
                       class="form-control bg-dark text-white border-secondary"
                       placeholder="Password" required>
            </div>

            {% if form.errors %}
                <p class="text-danger small text-center mb-3">
                    <i class="fas fa-exclamation-circle me-1"></i>
                    Invalid username or password.
                </p>
            {% endif %}

            <button type="submit" class="btn btn-info w-100 fw-bold">
                <i class="fas fa-sign-in-alt me-2"></i>LOGIN
            </button>
        </form>
    </div>

</body>
</html>
