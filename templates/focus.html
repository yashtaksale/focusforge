{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deep Focus Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Architects+Daughter&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nunito', sans-serif;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(160deg, #c5cae9 0%, #d9ddf2 40%, #e8eaf6 70%, #dde0f5 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  user-select: none;
}

/* ── SPARKLE DECORATIONS ── */
.sparkle {
  position: fixed;
  pointer-events: none;
  color: #5c6bc0;
  opacity: 0;
  animation: sparkleFade var(--sd, 4s) ease-in-out infinite;
  animation-delay: var(--sdelay, 0s);
}
.sparkle svg { width: var(--sz, 22px); height: var(--sz, 22px); }
@keyframes sparkleFade {
  0%,100% { opacity: 0;    transform: scale(0.7) rotate(0deg); }
  40%,60% { opacity: 0.55; transform: scale(1)   rotate(15deg); }
}
.cross {
  position: fixed;
  pointer-events: none;
  color: #7986cb;
  font-size: var(--csz, 24px);
  font-weight: 300;
  opacity: 0;
  animation: crossFade var(--cd, 5s) ease-in-out infinite;
  animation-delay: var(--cdelay, 0s);
}
@keyframes crossFade {
  0%,100% { opacity: 0; }
  50%      { opacity: 0.35; }
}

/* ── TOP TIME ── */
.top-time {
  position: fixed;
  top: 18px; left: 22px;
  font-size: 0.88rem;
  font-weight: 700;
  color: #5c6bc0;
  opacity: 0.75;
  letter-spacing: 0.03em;
}

/* ── SUBJECT BADGE ── */
.subject-badge {
  position: fixed;
  top: 14px; right: 18px;
  background: rgba(92,107,192,0.18);
  border: 1px solid rgba(92,107,192,0.25);
  border-radius: 100px;
  padding: 6px 16px;
  font-size: 0.78rem;
  font-weight: 700;
  color: #3949ab;
  display: none;
}

/* ── CENTER CONTENT ── */
.center-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  position: relative;
  z-index: 5;
}

/* Motivational message */
.motive-msg {
  font-size: clamp(0.82rem, 1.6vw, 1rem);
  font-weight: 700;
  color: #5c6bc0;
  opacity: 0.8;
  letter-spacing: 0.02em;
  margin-bottom: 18px;
  transition: opacity 0.4s;
  text-align: center;
}

/* Giant timer */
.focus-timer {
  font-size: clamp(96px, 18vw, 200px);
  font-weight: 900;
  color: #5c6bc0;
  letter-spacing: -2px;
  line-height: 1;
  opacity: 0.72;
  transition: opacity 0.3s;
  font-variant-numeric: tabular-nums;
}
.focus-timer.paused {
  opacity: 0.4;
}

/* Buttons row */
.btn-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 36px;
}

.btn-pause {
  padding: 12px 38px;
  border-radius: 100px;
  border: none;
  background: #5c6bc0;
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(92,107,192,0.35);
  letter-spacing: 0.02em;
}
.btn-pause:hover {
  background: #3949ab;
  transform: scale(1.04);
  box-shadow: 0 6px 28px rgba(92,107,192,0.5);
}
.btn-pause:active { transform: scale(0.98); }

.btn-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: #5c6bc0;
  color: white;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(92,107,192,0.3);
}
.btn-icon:hover {
  background: #3949ab;
  transform: scale(1.08);
  box-shadow: 0 6px 22px rgba(92,107,192,0.45);
}
.btn-icon:active { transform: scale(0.96); }

/* ── CAT CORNER ── */
.cat-corner {
  position: fixed;
  bottom: 0;
  right: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  z-index: 10;
}

.cat-msg {
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  color: #3949ab;
  text-align: center;
  line-height: 1.4;
  margin-bottom: 8px;
  opacity: 0.85;
  transition: opacity 0.4s;
}
.cat-msg.fade { opacity: 0; }

/* SVG cat – dark sitting cat like reference */
.cat-svg-wrap {
  width: 110px;
  animation: catSit 5s ease-in-out infinite;
}
@keyframes catSit {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
.cat-svg-wrap.angry {
  animation: catAngryShake 0.4s ease-in-out infinite;
}
@keyframes catAngryShake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-5px) rotate(-2deg); }
  75%      { transform: translateX(5px) rotate(2deg); }
}

/* Tail wag */
@keyframes tailWag {
  0%,100% { transform: rotate(-12deg); transform-origin: 30% 10%; }
  50%      { transform: rotate(22deg);  transform-origin: 30% 10%; }
}
/* Ear twitch */
@keyframes earL {
  0%,85%,100% { transform: rotate(0); }
  90%          { transform: rotate(-10deg); }
  95%          { transform: rotate(5deg); }
}
@keyframes earR {
  0%,80%,100% { transform: rotate(0); }
  85%          { transform: rotate(10deg); }
  92%          { transform: rotate(-4deg); }
}
/* Eye blink */
@keyframes blink {
  0%,92%,100% { transform: scaleY(1); }
  96%          { transform: scaleY(0.08); }
}

.cat-tail { animation: tailWag 2.2s ease-in-out infinite; transform-origin: 30% 10%; }
.cat-ear-l { animation: earL 7s ease-in-out infinite; transform-origin: 50% 90%; }
.cat-ear-r { animation: earR 7s ease-in-out infinite 0.4s; transform-origin: 50% 90%; }
.cat-eye-l { animation: blink 5s ease-in-out infinite; transform-origin: center; }
.cat-eye-r { animation: blink 5s ease-in-out infinite 0.07s; transform-origin: center; }

/* ── DISTRACTION BADGE (small, top-left of cat) ── */
.dist-chip {
  position: fixed;
  bottom: 28px;
  left: 28px;
  background: rgba(92,107,192,0.12);
  border: 1px solid rgba(92,107,192,0.22);
  border-radius: 14px;
  padding: 10px 18px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  backdrop-filter: blur(10px);
  transition: border-color 0.3s, background 0.3s;
  z-index: 20;
}
.dist-chip.alert {
  background: rgba(183,28,28,0.08);
  border-color: rgba(183,28,28,0.25);
}
.dist-num {
  font-size: 1.6rem; font-weight: 900; color: #5c6bc0; line-height:1;
  transition: transform 0.15s;
}
.dist-chip.alert .dist-num { color: #c62828; }
.dist-num.pop { transform: scale(1.7); }
.dist-lbl {
  font-size: 0.62rem; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase; color: #7986cb; opacity: 0.7;
}

/* ── SETTINGS PANEL ── */
.settings-panel {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) scale(0.96);
  background: rgba(255,255,255,0.55);
  border: 1px solid rgba(92,107,192,0.2);
  border-radius: 20px;
  padding: 20px 28px;
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(92,107,192,0.15);
  display: none;
  flex-direction: column;
  gap: 14px;
  z-index: 30;
  min-width: 260px;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
}
.settings-panel.open {
  display: flex; opacity: 1; transform: translateX(-50%) scale(1);
}
.settings-title {
  font-size: 0.85rem; font-weight: 800; color: #3949ab;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.settings-row {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.settings-row label {
  font-size: 0.82rem; font-weight: 700; color: #5c6bc0;
}
.settings-row button {
  padding: 6px 16px; border-radius: 100px;
  border: 1px solid rgba(92,107,192,0.3);
  background: rgba(92,107,192,0.1); color: #3949ab;
  font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
}
.settings-row button:hover { background: rgba(92,107,192,0.2); }
.settings-close {
  align-self: flex-end;
  padding: 6px 16px; border-radius: 100px;
  border: none; background: #5c6bc0; color: white;
  font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 700;
  cursor: pointer;
}

/* music bar (hidden, floating top-right) */
.music-chip {
  position: fixed; top: 14px; left: 50%;
  transform: translateX(-50%);
  background: rgba(92,107,192,0.12);
  border: 1px solid rgba(92,107,192,0.2);
  border-radius: 100px;
  padding: 6px 18px 6px 10px;
  display: flex; align-items: center; gap: 10px;
  backdrop-filter: blur(12px);
  z-index: 20;
}
.music-chip button {
  width: 28px; height: 28px; border-radius: 50%;
  border: none; background: #5c6bc0; color: white;
  font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.music-chip button:hover { background: #3949ab; }
.music-chip span {
  font-size: 0.75rem; font-weight: 700; color: #3949ab; opacity: 0.8;
}
.eq { display:flex; align-items:flex-end; gap:2px; height:14px; }
.eq i { display:block; width:3px; border-radius:2px; background:#5c6bc0; height:3px; }
.eq.active i:nth-child(1){animation:eqP .5s .0s ease-in-out infinite alternate}
.eq.active i:nth-child(2){animation:eqP .4s .1s ease-in-out infinite alternate}
.eq.active i:nth-child(3){animation:eqP .6s .2s ease-in-out infinite alternate}
@keyframes eqP{0%{height:3px}100%{height:12px}}

/* webcam hidden */
#focusWebcam {
  position:fixed; bottom:0; left:0; width:80px;
  opacity:0.12; border-radius:8px;
  border:1px solid rgba(92,107,192,0.2);
  transition:opacity .3s; z-index:1;
}
#focusWebcam:hover { opacity:0.5; }

/* End button */
.end-btn {
  position: fixed; top: 14px; right: 18px;
  padding: 8px 20px; border-radius: 100px;
  border: 1px solid rgba(92,107,192,0.3);
  background: rgba(92,107,192,0.1); color: #3949ab;
  font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 800;
  cursor: pointer; transition: all 0.2s; z-index: 30;
}
.end-btn:hover { background: rgba(92,107,192,0.2); transform: scale(1.03); }

/* entry */
.center-wrap { animation: fadeUp .7s ease both; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<!-- Sparkles & crosses injected by JS -->

<!-- Top time -->
<div class="top-time" id="topTime"></div>

<!-- End button (replaces subject badge on small screens) -->
<button class="end-btn" onclick="stopFocusMode()">✕ End</button>

<!-- Music chip -->
<div class="music-chip">
  <button id="musicBtn" onclick="toggleMusic()">▶</button>
  <div class="eq" id="eqBars"><i></i><i></i><i></i></div>
  <span id="musicStatus">Lofi beats</span>
</div>
<audio id="lofiMusic" loop>
  <source src="{% static 'audio/lofi.mp3' %}" type="audio/mp3">
</audio>
<!-- Center -->
<div class="center-wrap">
  <div class="motive-msg" id="motiveMsg">You're building momentum, don't stop now!</div>
  <div class="focus-timer" id="focusTimer">00:00</div>
  <div class="btn-row">
    <button class="btn-pause" id="pauseBtn" onclick="togglePause()">Pause</button>
    <button class="btn-icon" onclick="resetTimer()" title="Reset">↺</button>
    <button class="btn-icon" onclick="toggleSettings()" title="Settings">⚙</button>
  </div>
</div>

<!-- Settings panel -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-title">⚙ Settings</div>
  <div class="settings-row">
    <label>Pomodoro (25 min)</label>
    <button onclick="setMode('pomodoro')">Use</button>
  </div>
  <div class="settings-row">
    <label>Count Up</label>
    <button onclick="setMode('countup')">Use</button>
  </div>
  <div class="settings-row">
    <label>Session: 45 min</label>
    <button onclick="setMode('45')">Use</button>
  </div>
  <button class="settings-close" onclick="toggleSettings()">Close</button>
</div>

<!-- Distraction chip -->
<div class="dist-chip" id="distChip">
  <div class="dist-num" id="focusDistractions">0</div>
  <div class="dist-lbl">distractions</div>
</div>

<!-- Cat corner -->
<div class="cat-corner">
  <div class="cat-msg" id="catMsg">He is watching over<br>you, work hard!</div>
  <div class="cat-svg-wrap" id="catWrap">
    <svg id="catSVG" viewBox="0 0 110 160" xmlns="http://www.w3.org/2000/svg" width="110" height="160"></svg>
  </div>
</div>

<!-- Webcam (invisible, for detection) -->
<video id="focusWebcam" autoplay muted playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

<script>
// ── STATE ──────────────────────────────────────────────────────
let startTime     = null;
let elapsed       = 0;        // seconds elapsed (or seconds remaining if countdown)
let timerLoop     = null;
let paused        = false;
let mode          = 'countup'; // 'countup' | 'pomodoro' | '45'
let countdownSecs = 0;
let distCount     = 0;
let musicPlaying  = false;
let tfModel       = null;
let phoneWas      = false;
let catMsgTimer   = null;
const SESSION_TARGET = 90 * 60;

// ── SPARKLES / CROSSES ─────────────────────────────────────────
function createDecorations() {
  const sparklePositions = [
    { top:'12%', left:'8%',  sz:'28px', sd:'5s',  sdelay:'0s'   },
    { top:'28%', left:'3%',  sz:'16px', sd:'7s',  sdelay:'1.5s' },
    { top:'60%', left:'6%',  sz:'22px', sd:'4.5s',sdelay:'2s'   },
    { top:'15%', right:'8%', sz:'20px', sd:'6s',  sdelay:'0.8s' },
    { top:'50%', right:'4%', sz:'26px', sd:'5.5s',sdelay:'3s'   },
    { top:'75%', left:'12%', sz:'18px', sd:'4s',  sdelay:'1s'   },
    { top:'80%', right:'22%',sz:'14px', sd:'6.5s',sdelay:'2.5s' },
  ];
  sparklePositions.forEach(p => {
    const el = document.createElement('div');
    el.className = 'sparkle';
    Object.assign(el.style, {
      top: p.top || 'auto', bottom: p.bottom || 'auto',
      left: p.left || 'auto', right: p.right || 'auto',
      '--sz': p.sz, '--sd': p.sd, '--sdelay': p.sdelay,
    });
    el.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 0 L13.5 10.5 L24 12 L13.5 13.5 L12 24 L10.5 13.5 L0 12 L10.5 10.5 Z"/>
    </svg>`;
    document.body.appendChild(el);
  });

  const crossPositions = [
    { top:'22%', left:'18%', csz:'20px', cd:'6s',  cdelay:'0.5s' },
    { top:'68%', left:'22%', csz:'16px', cd:'5s',  cdelay:'2s'   },
    { top:'35%', right:'14%',csz:'22px', cd:'7s',  cdelay:'1.2s' },
    { top:'70%', right:'18%',csz:'18px', cd:'4.5s',cdelay:'3s'   },
    { top:'45%', left:'28%', csz:'12px', cd:'8s',  cdelay:'1.8s' },
  ];
  crossPositions.forEach(p => {
    const el = document.createElement('div');
    el.className = 'cross';
    Object.assign(el.style, {
      top: p.top, left: p.left || 'auto', right: p.right || 'auto',
      '--csz': p.csz, '--cd': p.cd, '--cdelay': p.cdelay,
    });
    el.textContent = '+';
    document.body.appendChild(el);
  });
}

// ── DRAW CAT ───────────────────────────────────────────────────
function drawCat(angry) {
  const svg = document.getElementById('catSVG');
  // Dark tuxedo sitting cat (reference style)
  const body  = '#2d2d3e';
  const belly = '#f5f0e8';
  const tail  = '#242433';
  const eye   = angry ? '#e53935' : '#f5f0e8';
  const pupil = angry ? '#fff' : '#2d2d3e';
  const nose  = '#e91e63';
  const shadow= 'rgba(45,45,62,0.18)';

  const eyeExprL = angry
    ? `<path d="M33,55 L44,50 L44,58 Z" fill="${eye}"/>`
    : `<g class="cat-eye-l">
         <ellipse cx="38" cy="54" rx="6" ry="6.5" fill="${eye}"/>
         <ellipse cx="39" cy="53" rx="2.5" ry="3" fill="${pupil}"/>
       </g>`;
  const eyeExprR = angry
    ? `<path d="M66,50 L77,55 L66,58 Z" fill="${eye}"/>`
    : `<g class="cat-eye-r">
         <ellipse cx="72" cy="54" rx="6" ry="6.5" fill="${eye}"/>
         <ellipse cx="73" cy="53" rx="2.5" ry="3" fill="${pupil}"/>
       </g>`;

  svg.innerHTML = `
  <!-- shadow -->
  <ellipse cx="55" cy="155" rx="36" ry="7" fill="${shadow}"/>

  <!-- tail (behind body) -->
  <g class="cat-tail">
    <path d="M62,130 Q90,125 88,108 Q86,95 78,100 Q72,105 76,115 Q80,126 65,135 Z"
          fill="${tail}" opacity=".92"/>
  </g>

  <!-- body -->
  <ellipse cx="52" cy="118" rx="36" ry="38" fill="${body}"/>

  <!-- belly white patch -->
  <ellipse cx="52" cy="122" rx="17" ry="22" fill="${belly}" opacity=".88"/>

  <!-- front paws -->
  <ellipse cx="37" cy="148" rx="12" ry="7" fill="${body}"/>
  <ellipse cx="67" cy="148" rx="12" ry="7" fill="${body}"/>
  <!-- paw toe lines -->
  <path d="M30,148 Q37,144 44,148" stroke="${belly}" stroke-width="1" fill="none" opacity=".4"/>
  <path d="M60,148 Q67,144 74,148" stroke="${belly}" stroke-width="1" fill="none" opacity=".4"/>

  <!-- head -->
  <ellipse cx="55" cy="50" rx="30" ry="28" fill="${body}"/>

  <!-- white chest/face patch -->
  <ellipse cx="55" cy="56" rx="14" ry="16" fill="${belly}" opacity=".78"/>

  <!-- ears -->
  <g class="cat-ear-l">
    <polygon points="28,32 24,10 42,28" fill="${body}"/>
    <polygon points="30,29 27,16 40,28" fill="#6b6b8a" opacity=".5"/>
  </g>
  <g class="cat-ear-r">
    <polygon points="82,32 86,10 68,28" fill="${body}"/>
    <polygon points="80,29 83,16 70,28" fill="#6b6b8a" opacity=".5"/>
  </g>

  <!-- eyes -->
  ${eyeExprL}
  ${eyeExprR}

  <!-- nose -->
  <polygon points="55,65 52,69 58,69" fill="${nose}" opacity=".9"/>

  <!-- mouth -->
  ${angry
    ? `<path d="M48,72 Q55,68 62,72" stroke="${belly}" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".6"/>`
    : `<path d="M48,70 Q55,75 62,70" stroke="${belly}" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".55"/>`
  }

  <!-- whiskers -->
  <line x1="20" y1="64" x2="47" y2="66" stroke="${belly}" stroke-width="1" opacity=".4"/>
  <line x1="20" y1="69" x2="47" y2="69" stroke="${belly}" stroke-width="1" opacity=".35"/>
  <line x1="63" y1="66" x2="90" y2="64" stroke="${belly}" stroke-width="1" opacity=".4"/>
  <line x1="63" y1="69" x2="90" y2="69" stroke="${belly}" stroke-width="1" opacity=".35"/>
  `;

  const wrap = document.getElementById('catWrap');
  wrap.className = 'cat-svg-wrap' + (angry ? ' angry' : '');
}

// ── MESSAGES ───────────────────────────────────────────────────
const happyMsgs = [
  'He is watching over\nyou, work hard!',
  'Stay focused!\nYou\'ve got this 💪',
  'Keep going,\ndon\'t stop now!',
  'You\'re building\nmomentum!',
  'Proud of you,\nhuman 🐱',
  'One more minute,\nthen one more!',
  'Deep focus\nmode activated ✨',
];
const angryMsgs = [
  'PUT THE PHONE\nDOWN! 😾',
  'HEY!\nNo distractions! 🙀',
  'FOCUS,\nHUMAN! 😤',
  'I see that phone...\nput it AWAY! 😾',
];

function setMsg(msg, angry) {
  const el = document.getElementById('catMsg');
  el.classList.add('fade');
  setTimeout(() => {
    el.innerHTML = msg.replace(/\n/g, '<br>');
    el.classList.remove('fade');
  }, 400);
}

// ── TOP CLOCK ──────────────────────────────────────────────────
function updateTopTime() {
  const now = new Date();
  let h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('topTime').textContent = `${h}:${m} ${ampm}`;
}
setInterval(updateTopTime, 1000);
updateTopTime();

// ── TIMER ──────────────────────────────────────────────────────
function formatTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = String(Math.floor((secs % 3600) / 60)).padStart(2,'0');
  const s = String(secs % 60).padStart(2,'0');
  return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
}

function tick() {
  if (paused) return;

  if (mode === 'countup') {
    elapsed++;
    document.getElementById('focusTimer').textContent = formatTime(elapsed);
  } else {
    if (countdownSecs <= 0) {
      new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg").play();
      clearInterval(timerLoop);
      document.getElementById('focusTimer').textContent = '00:00';
      document.getElementById('motiveMsg').textContent = '🎉 Session complete! Great work!';
      return;
    }
    countdownSecs--;
    document.getElementById('focusTimer').textContent = formatTime(countdownSecs);
  }
}

function startTimer() {
  clearInterval(timerLoop);
  timerLoop = setInterval(tick, 1000);
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  const timerEl = document.getElementById('focusTimer');
  btn.textContent = paused ? 'Resume' : 'Pause';
  timerEl.classList.toggle('paused', paused);

  const msgs = [
    'You\'re building momentum, don\'t stop now!',
    'Every second counts — keep going!',
    'Focus is your superpower ✨',
    'You\'re doing amazing, keep it up!',
    'Consistency beats perfection 🎯',
  ];
  if (!paused) {
    document.getElementById('motiveMsg').textContent =
      msgs[Math.floor(Math.random() * msgs.length)];
  }
}

function resetTimer() {
  elapsed = 0;
  if (mode !== 'countup') {
    countdownSecs = mode === 'pomodoro' ? 25 * 60 : 45 * 60;
  }
  document.getElementById('focusTimer').textContent = formatTime(mode === 'countup' ? 0 : countdownSecs);
  distCount = 0;
  document.getElementById('focusDistractions').textContent = '0';
  document.getElementById('distChip').classList.remove('alert');
}

function setMode(m) {
  mode = m;
  clearInterval(timerLoop);
  elapsed = 0;
  if (m === 'pomodoro') countdownSecs = 25 * 60;
  else if (m === '45')   countdownSecs = 45 * 60;
  const display = m === 'countup' ? '00:00' : formatTime(countdownSecs);
  document.getElementById('focusTimer').textContent = display;
  paused = false;
  document.getElementById('pauseBtn').textContent = 'Pause';
  document.getElementById('focusTimer').classList.remove('paused');
  startTimer();
  toggleSettings();
}

function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  p.classList.toggle('open');
}

// ── CAMERA & DETECTION ─────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:{ width:320, height:240 }, audio:false });
    document.getElementById('focusWebcam').srcObject = stream;
    tfModel = await cocoSsd.load({ base:'lite_mobilenet_v2' });
    detect();
  } catch(e) {
    console.warn('Camera unavailable');
  }
}
async function detect() {
  const v = document.getElementById('focusWebcam');
  if (tfModel && v && v.srcObject) {
    try {
      const preds = await tfModel.detect(v);
      const phone  = preds.some(p => p.class === 'cell phone' && p.score > 0.40);
      const person = preds.some(p => p.class === 'person'     && p.score > 0.40);
      catReact(phone, !person);
    } catch(e) {}
  }
  requestAnimationFrame(detect);
}

function catReact(phoneFound, personGone) {
  const chip = document.getElementById('distChip');
  if (phoneFound || personGone) {
    if (!phoneWas) {
      phoneWas = true;
      distCount++;
      const numEl = document.getElementById('focusDistractions');
      numEl.textContent = distCount;
      numEl.classList.add('pop');
      setTimeout(() => numEl.classList.remove('pop'), 200);
      chip.classList.add('alert');
      drawCat(true);
      setMsg(angryMsgs[Math.floor(Math.random() * angryMsgs.length)], true);
    }
  } else {
    if (phoneWas) {
      phoneWas = false;
      chip.classList.remove('alert');
      drawCat(false);
      setMsg(happyMsgs[Math.floor(Math.random() * happyMsgs.length)], false);
    }
  }
}

// ── MUSIC ──────────────────────────────────────────────────────
function toggleMusic() {
  const m   = document.getElementById('lofiMusic');
  const btn = document.getElementById('musicBtn');
  const eq  = document.getElementById('eqBars');
  if (!musicPlaying) {
    m.play().then(() => {
      musicPlaying = true;
      btn.textContent = '⏸';
      document.getElementById('musicStatus').textContent = 'Lofi playing';
      eq.classList.add('active');
    }).catch(() => {
      alert("Click anywhere first to enable audio 🎵");
    });
  } else {
    m.pause();
    musicPlaying = false;
    btn.textContent = '▶';
    document.getElementById('musicStatus').textContent = 'Lofi beats';
    eq.classList.remove('active');
  }
}

// ── STOP ───────────────────────────────────────────────────────
function stopFocusMode() {
  clearInterval(timerLoop); clearInterval(catMsgTimer);
  const v = document.getElementById('focusWebcam');
  if (v && v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
  document.getElementById('lofiMusic').pause();
  const mins = Math.floor(elapsed / 60);
  alert(`🧠 Focus Session Complete!\n\n⏱  Time: ${mins} minute(s)\n⚠️  Distractions: ${distCount}\n\n${distCount === 0 ? '🏆 Perfect — zero distractions!' : distCount < 3 ? '🎯 Great job, very focused!' : '💪 Keep practising deep focus!'}`);
  window.close();
}

// ── SUBJECT ────────────────────────────────────────────────────
(function() {
  const s = new URLSearchParams(window.location.search).get('subject');
  if (s) document.title = decodeURIComponent(s) + ' — Focus';
})();

// ── INIT ───────────────────────────────────────────────────────
createDecorations();
drawCat(false);
startTimer();
startCamera();

catMsgTimer = setInterval(() => {
  if (!phoneWas) {
    const msgs = happyMsgs;
    setMsg(msgs[Math.floor(Math.random() * msgs.length)], false);
  }
}, 16000);
</script>
</body>
